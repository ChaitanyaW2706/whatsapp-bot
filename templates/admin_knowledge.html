<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSherpa | Knowledge Ingestion</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        header { text-align: center; margin-bottom: 32px; }
        h1 { font-weight: 600; font-size: 2rem; margin-bottom: 8px; color: #fff; }
        p.subtitle { color: var(--text-dim); font-size: 0.95rem; }

        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 400; color: var(--text-dim); font-size: 0.9rem; }

        select, input[type="file"] {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2); }

        .file-upload-wrapper {
            position: relative;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .file-upload-wrapper:hover { border-color: var(--primary); background: rgba(79, 70, 229, 0.05); }
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        .upload-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
        .file-name { margin-top: 12px; color: var(--primary); font-weight: 600; display: none; }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }

        #status {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .status-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Knowledge Vault</h1>
        <p class="subtitle">Ingest Excel, Word, or PDF files into the RAG engine</p>
    </header>

    <div class="form-group">
        <label>Select Target Module</label>
        <select id="moduleSelect">
            <option value="insurance">Vehicle Insurance</option>
            <option value="usedcars">Used Cars</option>
            <option value="sales">New Cars Sales</option>
            <option value="services">Vehicle Service</option>
            <option value="refinancing">Refinancing</option>
        </select>
    </div>

    <div class="form-group">
        <label>Upload Knowledge Documents</label>
        <div class="file-upload-wrapper" id="dropZone">
            <span class="upload-icon">📄</span>
            <p id="dropText">Drag and drop files here or click to browse</p>
            <p style="font-size: 0.8rem; margin-top: 8px; opacity: 0.6;">Supports .xlsx, .xls, .docx, .pdf, .txt, .csv, .pptx</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.docx,.pdf,.txt,.csv,.pptx" multiple>
            <div id="fileName" class="file-name"></div>
        </div>
    </div>

    <button id="uploadBtn">
        <span id="btnText">Ingest into AI Memory</span>
        <div class="loader" id="loader"></div>
    </button>

    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const dropText = document.getElementById('dropText');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusDiv = document.getElementById('status');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');

    fileInput.addEventListener('change', (e) => {
        const files = e.target.files;
        if (files.length > 0) {
            if (files.length === 1) {
                fileNameDisplay.textContent = "Selected: " + files[0].name;
            } else {
                fileNameDisplay.textContent = `Selected: ${files.length} files`;
            }
            fileNameDisplay.style.display = 'block';
            dropText.style.display = 'none';
        } else {
            fileNameDisplay.style.display = 'none';
            dropText.style.display = 'block';
        }
    });

    uploadBtn.addEventListener('click', async () => {
        const files = fileInput.files;
        const module = document.getElementById('moduleSelect').value;

        if (!files || files.length === 0) {
            showStatus("Please select at least one file first!", "error");
            return;
        }

        // Start Loading
        uploadBtn.disabled = true;
        btnText.style.display = 'none';
        loader.style.display = 'block';
        statusDiv.style.display = 'none';

        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('files', files[i]);
        }
        formData.append('module', module);

        try {
            const response = await fetch('/api/admin/upload-knowledge', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                let message = `✅ Success: ${result.message}`;
                if (result.processed_files && result.processed_files.length > 0) {
                    message += "\n\nProcessed files:\n" + result.processed_files.map(f => `• ${f.filename} (${f.text_chunks} chunks)`).join('\n');
                }
                if (result.errors && result.errors.length > 0) {
                    message += "\n\nErrors:\n" + result.errors.map(e => `• ${e}`).join('\n');
                }
                showStatus(message, "success");
                fileInput.value = "";
                fileNameDisplay.style.display = 'none';
                dropText.style.display = 'block';
            } else {
                let message = `❌ Error: ${result.message}`;
                if (result.errors && result.errors.length > 0) {
                    message += "\n\nDetails:\n" + result.errors.map(e => `• ${e}`).join('\n');
                }
                showStatus(message, "error");
            }
        } catch (error) {
            showStatus("❌ Failed to connect to server.", "error");
        } finally {
            uploadBtn.disabled = false;
            btnText.style.display = 'block';
            loader.style.display = 'none';
        }
    });

    function showStatus(text, type) {
        statusDiv.textContent = text;
        statusDiv.className = type === "success" ? "status-success" : "status-error";
        statusDiv.style.display = 'block';
    }
</script>

</body>
</html>
