<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Agent Login - AutoSherpa Support Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e293b; /* Slate 800 */
            --surface-color: #334155; /* Slate 700 */
            --surface-border: #475569; /* Slate 600 */
            --text-primary: #f8fafc; /* Slate 50 */
            --text-secondary: #cbd5e1; /* Slate 300 */
            --accent-color: #3b82f6; /* Slate Blue */
            --accent-hover: #2563eb; /* Darker Blue */
            --input-bg: #1e293b;
            --input-border: #475569;
            --input-focus: #60a5fa;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(37, 99, 235, 0.05), transparent 45%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.03), transparent 35%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Login Card */
        .login-wrapper {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: var(--accent-color);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: transform 0.3s ease;
        }

        .logo-icon:hover {
            transform: scale(1.05);
        }

        .header h2 {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
        }

        /* Form Inputs */
        .form-group {
            position: relative;
            margin-bottom: 24px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-control::placeholder {
            color: transparent; /* Hidden for floating label */
        }

        .form-control:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-group label {
            position: absolute;
            left: 16px;
            top: 14px;
            font-size: 15px;
            color: var(--text-secondary);
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            transform-origin: left top;
        }

        .form-control:focus~label,
        .form-control:not(:placeholder-shown)~label {
            top: -10px;
            left: 12px;
            font-size: 12px;
            color: var(--input-focus);
            background: var(--surface-color);
            padding: 0 4px;
            font-weight: 500;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Message */
        .message {
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 13.5px;
            text-align: center;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 13.5px;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            border-bottom: 1px dashed var(--text-secondary);
            transition: color 0.2s, border-color 0.2s;
        }

        .footer a:hover {
            color: var(--input-focus);
            border-bottom-color: var(--input-focus);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="header">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width: 28px; height: 28px; color: white;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 2a9 9 0 00-9 9v3a3 3 0 003 3h1a2 2 0 002-2V9a2 2 0 00-2-2H5a7 7 0 0114 0h-1a2 2 0 00-2 2v4a2 2 0 002 2h1a3 3 0 003-3v-3a9 9 0 00-9-9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 14v4a3 3 0 01-3 3h-2" />
                    </svg>
                </div>
                <h2>Portal Access</h2>
                <p>Enter your credentials to continue</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" name="email" class="form-control" placeholder="Email" required>
                    <label for="email">Email Address</label>
                </div>

                <div class="form-group">
                    <input type="password" id="password" name="password" class="form-control" placeholder="Password"
                        required>
                    <label for="password">Password</label>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div id="message"></div>

            <div class="footer">
                New agent? <a href="/agent/register">Register here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/agent/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();
                const messageDiv = document.getElementById('message');

                if (result.success) {
                    messageDiv.innerHTML = '<div class="message success">Login successful! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1000);
                } else {
                    messageDiv.innerHTML = '<div class="message error">' + result.message + '</div>';
                }
            } catch (error) {
                document.getElementById('message').innerHTML = '<div class="message error">Login failed. Please try again.</div>';
            }
        });
    </script>
</body>

</html>
